# Resource 설정 의도
#   CPU limits 의도적 생략: CPU=compressible 자원
#     - limit 두면 CFS throttling 발생 → 지연(p99) 악화
#     - Karpenter bin-packing 은 requests 기준이라 limits 없어도 안전
#     - 경합 시 requests 비율대로 공정 분배 → noisy neighbor 방어
#   Memory limits 만 유지: non-compressible → OOM 격리 필수
#   replicas 필드 부재: HPA/KEDA 단독 관리 (K8s 권장 패턴)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: baselink-dev
spec:
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      terminationGracePeriodSeconds: 45
      nodeSelector:
        workload-class: critical
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth-service
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: auth-service
      serviceAccountName: backend-runtime
      containers:
        - name: auth-service
          image: auth-service:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
