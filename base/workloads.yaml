apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-worker-service
  namespace: baselink-dev
spec:
  selector:
    matchLabels:
      app: ticket-worker-service
  template:
    metadata:
      labels:
        app: ticket-worker-service
    spec:
      nodeSelector:
        workload-class: batch
      serviceAccountName: backend-runtime
      containers:
        - name: ticket-worker-service
          image: ticket-worker-service:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pgrep -f java > /dev/null"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
