apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: baselink-dev
spec:
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      terminationGracePeriodSeconds: 45
      # general NodePool 배치 이유: order = 매점·굿즈 주문 (티켓 결제는 ticket-service 가 처리)
      # Spot 회수 시에도 SQS·DB 트랜잭션 + client retry 로 흡수 → general 으로 비용 최적화
      # 결제성 트랜잭션 변경 시 재검토 필요
      nodeSelector:
        workload-class: general
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: order-service
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: order-service
      serviceAccountName: backend-runtime
      containers:
        - name: order-service
          image: order-service:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]
          readinessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 20
