apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: waiting-room-endpoints-reader
  namespace: baselink-dev
rules:
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: waiting-room-endpoints-reader
  namespace: baselink-dev
subjects:
  - kind: ServiceAccount
    name: backend-runtime
    namespace: baselink-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: waiting-room-endpoints-reader
