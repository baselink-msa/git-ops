# PDB 전 서비스 적용 (9개, 모든 KEDA minReplicaCount=2)
#   설계 근거: 티켓 예매는 대체재가 있는 서비스 → 짧은 중단도 사용자 이탈로 직결
#   → 전 서비스 HA(replica 2) + PDB(maxUnavailable=1) 로
#     계획된 중단(노드 drain·업그레이드·Karpenter consolidation)에도 최소 1개 유지
#   전제: PDB 는 replica>=2 필수
#     (1-replica + PDB = drain 영구 차단/무의미 anti-pattern — min 올리기 전 PDB 금지)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ticket-service-pdb
  namespace: baselink-dev
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: ticket-service
---
