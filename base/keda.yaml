apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: waiting-room-service-scaler
  namespace: baselink-dev
spec:
  scaleTargetRef:
    name: waiting-room-service
  minReplicaCount: 2
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
    - type: postgresql
      # waiting-room: funnel 입구. 모든 사용자가 첫 진입 → 가장 높은 동시 접속 → 6
      metadata:
        query: |
          SELECT CASE WHEN EXISTS (
            SELECT 1 FROM ticket_open_schedule
            WHERE open_at BETWEEN NOW() AND NOW() + INTERVAL '15 minutes'
              AND status = 'scheduled'
          ) THEN 6 ELSE 0 END
        targetQueryValue: "1"
      authenticationRef:
        name: postgres-keda-auth
