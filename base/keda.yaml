apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: ticket-worker-sqs-auth
  namespace: baselink-dev
spec:
  podIdentity:
    provider: aws
    identityOwner: workload
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: postgres-keda-auth
  namespace: baselink-dev
spec:
  secretTargetRef:
    - parameter: connection
      name: postgres-keda-secret
      key: connection
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ticket-worker-scaler
  namespace: baselink-dev
spec:
  scaleTargetRef:
    name: ticket-worker-service
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 300
  triggers:
    - type: aws-sqs-queue
      metadata:
        # TODO(prod): account ID 평문 노출 — Sealed Secrets / External Secrets / kustomize secretGenerator 로 전환
        queueURL: https://sqs.ap-northeast-2.amazonaws.com/740831361032/ticket-confirm-queue
        queueLength: "5"
        awsRegion: ap-northeast-2
      authenticationRef:
        name: ticket-worker-sqs-auth
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ticket-service-scaler
  namespace: baselink-dev
spec:
  scaleTargetRef:
    name: ticket-service
  minReplicaCount: 2
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
    - type: postgresql
      # funnel 중간 단계 (waiting-room 통과 사용자만) → 4
      metadata:
        query: |
          SELECT CASE WHEN EXISTS (
            SELECT 1 FROM ticket_open_schedule
            WHERE open_at BETWEEN NOW() AND NOW() + INTERVAL '15 minutes'
              AND status = 'scheduled'
          ) THEN 4 ELSE 0 END
        targetQueryValue: "1"
      authenticationRef:
        name: postgres-keda-auth
---
