apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: ticket-worker-sqs-auth
  namespace: baselink-dev
spec:
  podIdentity:
    provider: aws
    identityOwner: workload
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ticket-worker-scaler
  namespace: baselink-dev
spec:
  scaleTargetRef:
    name: ticket-worker-service
  minReplicaCount: 1
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 300
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: https://sqs.ap-northeast-2.amazonaws.com/740831361032/ticket-confirm-queue
        queueLength: "5"
        awsRegion: ap-northeast-2
      authenticationRef:
        name: ticket-worker-sqs-auth
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ticket-service-scaler
  namespace: baselink-dev
spec:
  scaleTargetRef:
    name: ticket-service
  minReplicaCount: 2
  maxReplicaCount: 10
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
    - type: cron
      metadata:
        timezone: Asia/Seoul
        start: "50 13 * * *"
        end: "30 15 * * *"
        desiredReplicas: "4"
---
