apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: baselink-dev
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: <db-username>
  SPRING_DATASOURCE_PASSWORD: <db-password>
  APP_JWT_SECRET: <jwt-secret-at-least-32-bytes>
  AWS_ACCESS_KEY_ID: <only-if-not-using-irsa>
  AWS_SECRET_ACCESS_KEY: <only-if-not-using-irsa>
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-keda-secret
  namespace: baselink-dev
type: Opaque
stringData:
  # 형식: postgresql://USER:PASS@HOST:5432/DBNAME?sslmode=require
  # 실제 값은 Sealed Secrets / External Secrets 로 관리할 것
  connection: "postgresql://<user>:<pass>@<rds-endpoint>:5432/baselink?sslmode=require"

