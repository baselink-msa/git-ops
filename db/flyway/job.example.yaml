apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: baselink-dev
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: flyway
          image: flyway/flyway:10-alpine
          args:
            - -connectRetries=30
            - -locations=filesystem:/flyway/sql
            - migrate
          env:
            - name: FLYWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: SPRING_DATASOURCE_URL
            - name: FLYWAY_USER
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: SPRING_DATASOURCE_PASSWORD
          volumeMounts:
            - name: flyway-sql
              mountPath: /flyway/sql
      volumes:
        - name: flyway-sql
          configMap:
            name: flyway-sql
