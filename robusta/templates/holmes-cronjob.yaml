apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: holmes-cache-manager
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["holmes-analyzed-cache"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: holmes-cache-manager
  namespace: monitoring
subjects:
  - kind: ServiceAccount
    name: robusta-stack-holmes-service-account
    namespace: monitoring
roleRef:
  kind: Role
  name: holmes-cache-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: holmes-alert-analyzer
  namespace: monitoring
data:
  analyze.py: |
    #!/usr/bin/env python3
    """
    Firing alert를 Alertmanager에서 가져와 Holmes에 분석 요청 후 Slack/Jira로 전송.
    30분 내 동일 alert 재분석 방지 (ConfigMap 기반 중복 체크).
    """
    import json
    import os
    import base64
    import urllib.request
    import urllib.error
    import time
    import ssl
    from datetime import datetime, timezone

    ALERTMANAGER_URL = os.environ.get("ALERTMANAGER_URL", "http://monitoring-stack-kube-prom-alertmanager:9093")
    HOLMES_URL = os.environ.get("HOLMES_URL", "http://robusta-stack-holmes:80")
    SLACK_WEBHOOK_URL = os.environ.get("SLACK_WEBHOOK_URL", "")
    SLACK_BOT_TOKEN = os.environ.get("SLACK_BOT_TOKEN", "")
    SLACK_CHANNEL = os.environ.get("SLACK_CHANNEL", "infra-ai-analysis")
    JIRA_BASE_URL = os.environ.get("JIRA_BASE_URL", "https://mzcbaselink.atlassian.net").strip().rstrip("/")
    JIRA_EMAIL = os.environ.get("JIRA_EMAIL", "").strip()
    JIRA_API_TOKEN = os.environ.get("JIRA_API_TOKEN", "").strip()
    JIRA_PROJECT_KEY = os.environ.get("JIRA_PROJECT_KEY", "SCRUM").strip()
    JIRA_PARENT_KEY = os.environ.get("JIRA_PARENT_KEY", "").strip()
    JIRA_ISSUE_TYPE = os.environ.get("JIRA_ISSUE_TYPE", "Task").strip()
    JIRA_ISSUE_TYPE_ID = os.environ.get("JIRA_ISSUE_TYPE_ID", "").strip()
    CACHE_CM_NAME = "holmes-analyzed-cache"
    CACHE_CM_NAMESPACE = "monitoring"
    DEDUP_SECONDS = 1800  # 30분

    # 분석 제외할 alert (노이즈/시스템용/EKS 관리형 false positive)
    EXCLUDED_ALERTS = {"Watchdog", "InfoInhibitor", "KubeSchedulerDown", "KubeControllerManagerDown", "KubeHpaMaxedOut", "KubeletTooManyPods", "TargetDown"}

    # severity가 warning 또는 critical인 것만 분석
    ALLOWED_SEVERITIES = {"warning", "critical"}

    def get_cache():
        """Kubernetes API로 ConfigMap에서 이전 분석 기록 조회"""
        token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        try:
            with open(token_path) as f:
                token = f.read().strip()
            url = f"https://kubernetes.default.svc/api/v1/namespaces/{CACHE_CM_NAMESPACE}/configmaps/{CACHE_CM_NAME}"
            req = urllib.request.Request(url, headers={
                "Authorization": f"Bearer {token}",
            })
            ctx = ssl.create_default_context(cafile=ca_path)
            with urllib.request.urlopen(req, timeout=10, context=ctx) as resp:
                cm = json.loads(resp.read().decode())
                cache_data = cm.get("data", {}).get("cache", "{}")
                return json.loads(cache_data)
        except Exception:
            return {}

    def save_cache(cache):
        """Kubernetes API로 ConfigMap에 분석 기록 저장"""
        token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        ca_path = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        try:
            with open(token_path) as f:
                token = f.read().strip()
            ctx = ssl.create_default_context(cafile=ca_path)
            cache_json = json.dumps(cache)
            body = json.dumps({
                "apiVersion": "v1",
                "kind": "ConfigMap",
                "metadata": {"name": CACHE_CM_NAME, "namespace": CACHE_CM_NAMESPACE},
                "data": {"cache": cache_json}
            }).encode()

            url = f"https://kubernetes.default.svc/api/v1/namespaces/{CACHE_CM_NAMESPACE}/configmaps/{CACHE_CM_NAME}"
            req = urllib.request.Request(url, data=body, method="PUT", headers={
                "Authorization": f"Bearer {token}",
                "Content-Type": "application/json",
            })
            try:
                urllib.request.urlopen(req, timeout=10, context=ctx)
            except urllib.error.HTTPError as e:
                if e.code == 404:
                    url = f"https://kubernetes.default.svc/api/v1/namespaces/{CACHE_CM_NAMESPACE}/configmaps"
                    req = urllib.request.Request(url, data=body, method="POST", headers={
                        "Authorization": f"Bearer {token}",
                        "Content-Type": "application/json",
                    })
                    urllib.request.urlopen(req, timeout=10, context=ctx)
                else:
                    raise
        except Exception as e:
            print(f"[WARN] 캐시 저장 실패: {e}")

    def is_recently_analyzed(cache, alert_name):
        """30분 내 분석한 alertname인지 확인"""
        if alert_name not in cache:
            return False
        last_time = cache[alert_name]
        now = datetime.now(timezone.utc).timestamp()
        return (now - last_time) < DEDUP_SECONDS

    def get_alert_cache_key(alert):
        labels = alert.get("labels", {})
        alert_name = labels.get("alertname", "Unknown")
        fingerprint = alert.get("fingerprint", "")
        starts_at = alert.get("startsAt", "")
        if fingerprint:
            return f"{alert_name}:{fingerprint}"
        if starts_at:
            return f"{alert_name}:{starts_at}"
        return alert_name

    def get_firing_alerts():
        url = f"{ALERTMANAGER_URL}/api/v2/alerts?active=true"
        req = urllib.request.Request(url)
        try:
            with urllib.request.urlopen(req, timeout=10) as resp:
                return json.loads(resp.read().decode())
        except Exception as e:
            print(f"[ERROR] Alertmanager 조회 실패: {e}")
            return []

    def infer_service_name(alert_name, labels):
        """라벨에서 실제 서비스명을 추론 (exporter 라벨 무시)"""
        known_services = {
            "auth": "auth-service",
            "gameserv": "game-service",
            "game": "game-service",
            "admin": "admin-service",
            "waiting": "waiting-room-service",
            "ticketwo": "ticket-worker-service",
            "ticket": "ticket-service",
            "seatlock": "seat-lock-service",
            "seat": "seat-lock-service",
            "order": "order-service",
            "aichat": "ai-chatbot-service",
            "chatbot": "ai-chatbot-service",
        }

        hpa_name = labels.get("horizontalpodautoscaler", "")
        if hpa_name.startswith("keda-hpa-") and hpa_name.endswith("-scaler"):
            return hpa_name.removeprefix("keda-hpa-").removesuffix("-scaler")

        target_group = labels.get("dimension_TargetGroup", "")
        if target_group.startswith("k8s-"):
            target_group_name = target_group.split("/", 1)[0].lower()
            for token, service in known_services.items():
                if token in target_group_name:
                    return service

        for key in ("service", "app", "deployment", "namespace", "job"):
            val = labels.get(key, "")
            lowered = val.lower()
            if val and not any(skip in lowered for skip in ("exporter", "yace", "kube-state-metrics", "prometheus")):
                return val
        return labels.get("namespace", "unknown")

    def ask_holmes(alert_name, summary, labels):
        labels_str = json.dumps(labels, ensure_ascii=False)
        question = (
            f"다음 Kubernetes alert를 분석해줘.\n"
            f"\n"
            f"alert name = '{alert_name}'\n"
            f"summary = {summary}\n"
            f"labels = {labels_str}\n"
            f"\n"
            f"[분석 규칙 - 반드시 따를 것]\n"
            f"1. 라벨을 재진술하지 마. 사용 가능한 도구(kubectl, prometheus 쿼리)를 적극 사용해서 실제 원인을 조사해.\n"
            f"2. pod/container/instance/job 라벨이 exporter(yace, node-exporter, kube-state-metrics, prometheus)를 가리키면, 그건 데이터 수집 출처일 뿐 원인이 아니야. 무시해.\n"
            f"3. dimension_TargetGroup 이름(예 k8s-baselink-gameserv-...)에서 실제 K8s 서비스/Deployment를 추론하고, 그 워크로드의 Pod 상태, 재시작 이력, 최근 로그를 조회해.\n"
            f"\n"
            f"[alertname별 조사 우선순위]\n"
            f"- ALBUnhealthyHost/TargetDown = dimension_TargetGroup에서 K8s 워크로드 추론 후 Pod 상태/이벤트/로그 확인\n"
            f"- NodeMemoryHighUtilization/NodeSystemSaturation = 해당 노드의 Pod 리소스 사용량 top 확인\n"
            f"- CrashLoopBackOff/High5xxRate = 관련 워크로드 로그에서 에러 패턴 확인\n"
            f"\n"
            f"[답변 형식 - 반드시 한국어로만, 5~8줄 이내]\n"
            f"1. 현상 = 무엇이 문제인지 1줄\n"
            f"2. 원인 = 실제 조사 결과 기반, 추측 금지\n"
            f"3. 조치 = 구체적 행동 1~2개\n"
            f"\n"
            f"영어로 답하지 마. 조사해도 원인을 못 찾으면 추측하지 말고 '확인 필요' 항목을 명시해. 응답에 result 태그 붙이지 마."
        )
        data = json.dumps({
            "ask": question,
            "resource": {
                "name": alert_name,
                "namespace": labels.get("namespace", "unknown"),
                "kind": "Alert"
            }
        }).encode()
        req = urllib.request.Request(
            f"{HOLMES_URL}/api/chat",
            data=data,
            headers={"Content-Type": "application/json"}
        )
        try:
            with urllib.request.urlopen(req, timeout=120) as resp:
                result = json.loads(resp.read().decode())
                analysis = result.get("analysis", "분석 결과를 가져오지 못했습니다.")
                analysis = analysis.replace("<result>", "").replace("</result>", "").strip()
                return analysis
        except Exception as e:
            return f"Holmes 분석 실패: {e}"

    def parse_analysis_sections(analysis):
        """'현상/원인/조치' 형식 파싱. 실패하면 빈 dict 반환 (fallback은 호출부에서 처리)"""
        sections = {"symptom": "", "cause": "", "action": ""}
        lines = analysis.split("\n")
        current = None
        for line in lines:
            stripped = line.strip()
            head = stripped[:6]
            if "현상" in head or stripped.startswith("1."):
                current = "symptom"
                rest = stripped.split("=", 1)[-1].strip() if "=" in stripped else (stripped.split(":", 1)[-1].strip() if ":" in stripped else "")
                if rest:
                    sections[current] += rest + "\n"
                continue
            elif "원인" in head or stripped.startswith("2."):
                current = "cause"
                rest = stripped.split("=", 1)[-1].strip() if "=" in stripped else (stripped.split(":", 1)[-1].strip() if ":" in stripped else "")
                if rest:
                    sections[current] += rest + "\n"
                continue
            elif "조치" in head or stripped.startswith("3."):
                current = "action"
                rest = stripped.split("=", 1)[-1].strip() if "=" in stripped else (stripped.split(":", 1)[-1].strip() if ":" in stripped else "")
                if rest:
                    sections[current] += rest + "\n"
                continue
            if current and stripped:
                sections[current] += stripped + "\n"
        sections = {k: v.strip() for k, v in sections.items()}
        return sections

    def jira_request(path, data=None, method=None, timeout=15):
        auth_str = base64.b64encode(f"{JIRA_EMAIL}:{JIRA_API_TOKEN}".encode()).decode()
        body = json.dumps(data).encode() if data is not None else None
        req = urllib.request.Request(
            f"{JIRA_BASE_URL}{path}",
            data=body,
            method=method,
            headers={
                "Authorization": f"Basic {auth_str}",
                "Content-Type": "application/json",
                "Accept": "application/json",
            }
        )
        with urllib.request.urlopen(req, timeout=timeout) as resp:
            return json.loads(resp.read().decode())

    def log_accessible_jira_projects():
        try:
            result = jira_request("/rest/api/3/project/search?maxResults=20", method="GET", timeout=10)
            projects = result.get("values", [])
            if projects:
                project_list = ", ".join(f"{p.get('key')}({p.get('name')})" for p in projects)
                print(f"[INFO] Jira 접근 가능 프로젝트: {project_list}")
            else:
                print("[INFO] Jira 접근 가능 프로젝트 없음")
        except Exception as e:
            print(f"[WARN] Jira 프로젝트 목록 조회 실패: {e}")

    def create_jira_issue(alert_name, labels, analysis):
        if not JIRA_EMAIL or not JIRA_API_TOKEN:
            print("[SKIP] Jira 자격증명 미설정")
            return None
        if not JIRA_PROJECT_KEY:
            print("[SKIP] JIRA_PROJECT_KEY 미설정")
            return None
        try:
            service_name = infer_service_name(alert_name, labels)
            summary_text = f"[장애] {alert_name} - {service_name}"
            description_text = (
                f"AI 분석 결과\n\n{analysis}\n\n"
                f"---\nAlert Labels\n{json.dumps(labels, indent=2, ensure_ascii=False)}"
            )
            issue_type = {"id": JIRA_ISSUE_TYPE_ID} if JIRA_ISSUE_TYPE_ID else {"name": JIRA_ISSUE_TYPE}
            fields = {
                "project": {"key": JIRA_PROJECT_KEY},
                "summary": summary_text[:255],
                "description": {
                    "type": "doc",
                    "version": 1,
                    "content": [
                        {
                            "type": "paragraph",
                            "content": [{"type": "text", "text": description_text[:30000]}]
                        }
                    ]
                },
                "issuetype": issue_type,
                "labels": ["auto-incident", "holmes"]
            }
            if JIRA_PARENT_KEY:
                fields["parent"] = {"key": JIRA_PARENT_KEY}

            payload = {
                "fields": fields
            }
            result = jira_request("/rest/api/3/issue", data=payload, method="POST")
            issue_key = result.get("key", "")
            issue_url = f"{JIRA_BASE_URL}/browse/{issue_key}"
            print(f"[JIRA] 이슈 생성 완료: {issue_key}")
            return {"key": issue_key, "url": issue_url}
        except urllib.error.HTTPError as e:
            error_body = e.read().decode()
            print(f"[WARN] Jira 이슈 생성 실패 (HTTP {e.code}): {error_body}")
            if e.code in (400, 403, 404):
                print(f"[INFO] Jira 설정 확인 필요: project={JIRA_PROJECT_KEY}, issueType={JIRA_ISSUE_TYPE}, issueTypeId={JIRA_ISSUE_TYPE_ID or '(none)'}, parent={JIRA_PARENT_KEY or '(none)'}")
                log_accessible_jira_projects()
            return None
        except Exception as e:
            print(f"[WARN] Jira 이슈 생성 실패: {e}")
            return None

    def slack_api_post(payload):
        data = json.dumps(payload).encode()
        req = urllib.request.Request(
            "https://slack.com/api/chat.postMessage",
            data=data,
            headers={
                "Authorization": f"Bearer {SLACK_BOT_TOKEN}",
                "Content-Type": "application/json; charset=utf-8",
            }
        )
        with urllib.request.urlopen(req, timeout=10) as resp:
            result = json.loads(resp.read().decode())
            if not result.get("ok"):
                raise RuntimeError(f"{result.get('error', 'unknown Slack API error')} (channel={payload.get('channel')})")
            return result

    def slack_webhook_post(blocks, text):
        if not SLACK_WEBHOOK_URL:
            raise RuntimeError("SLACK_WEBHOOK_URL 미설정")
        data = json.dumps({"text": text, "blocks": blocks}).encode()
        req = urllib.request.Request(
            SLACK_WEBHOOK_URL,
            data=data,
            headers={"Content-Type": "application/json"}
        )
        urllib.request.urlopen(req, timeout=10)

    def send_to_slack(alert_name, summary, analysis, labels, jira_issue=None):
        if not SLACK_BOT_TOKEN and not SLACK_WEBHOOK_URL:
            print(f"[SKIP] Slack 설정 미설정. 콘솔 출력:\n{analysis}")
            return

        severity = labels.get("severity", "warning")
        is_critical = severity == "critical"
        status_emoji = "🟢" if labels.get("status") == "resolved" else ("🔴" if is_critical else "🟡")
        priority = "P1" if is_critical else "P2"
        urgency = "High" if is_critical else "Medium"
        service_name = infer_service_name(alert_name, labels)
        detected_time = datetime.now(timezone.utc).astimezone().strftime("%m/%d %H:%M")

        sections = parse_analysis_sections(analysis)
        symptom = sections.get("symptom") or summary or "요약 정보 없음"
        cause = sections.get("cause") or "확인 필요"
        action = sections.get("action") or "담당자가 추가 확인 필요"
        title = f"{status_emoji} [{priority}] {service_name} 장애 감지"
        fallback_text = f"{title} - {symptom}"

        blocks = [
            {
                "type": "section",
                "text": {"type": "mrkdwn", "text": f"*{title}*"}
            },
            {
                "type": "section",
                "text": {"type": "mrkdwn", "text": (
                    f"📦 *Incident type:* Kubernetes Alert\n"
                    f"🚨 *Priority:* {priority}\n"
                    f"⚡ *Urgency:* {urgency}\n"
                    f"🌐 *Service:* `{service_name}`\n"
                    f"🔔 *Triggered via:* `{alert_name}`\n"
                    f"⏰ *Detected:* {detected_time}"
                )}
            },
        ]

        if jira_issue:
            jira_key = jira_issue.get("key", "Jira")
            jira_url = jira_issue.get("url")
            blocks.append({
                "type": "actions",
                "elements": [
                    {
                        "type": "button",
                        "text": {"type": "plain_text", "text": f"📌 Jira 티켓 보기 ({jira_key})"},
                        "url": jira_url
                    }
                ]
            })

        thread_blocks = [
            {"type": "section", "text": {"type": "mrkdwn", "text": (
                f"🤖 *AI 자동 분석 요약*\n\n"
                f"📋 *현상*\n{symptom[:900]}\n\n"
                f"🔍 *원인*\n{cause[:900]}\n\n"
                f"🛠 *조치*\n{action[:900]}"
            )}},
        ]

        try:
            if SLACK_BOT_TOKEN:
                try:
                    result = slack_api_post({
                        "channel": SLACK_CHANNEL,
                        "text": fallback_text,
                        "blocks": blocks,
                        "unfurl_links": False,
                        "unfurl_media": False,
                    })
                    slack_api_post({
                        "channel": SLACK_CHANNEL,
                        "thread_ts": result["ts"],
                        "text": f"AI 자동 분석 요약: {symptom}",
                        "blocks": thread_blocks,
                        "unfurl_links": False,
                        "unfurl_media": False,
                    })
                except Exception as api_error:
                    if not SLACK_WEBHOOK_URL:
                        raise
                    print(f"[WARN] Slack API 전송 실패, webhook fallback 사용: {api_error}")
                    blocks.extend(thread_blocks)
                    slack_webhook_post(blocks, fallback_text)
            else:
                blocks.extend(thread_blocks)
                slack_webhook_post(blocks, fallback_text)
            print(f"[OK] Slack 전송 완료: {alert_name}")
        except Exception as e:
            print(f"[ERROR] Slack 전송 실패: {e}")

    def main():
        alerts = get_firing_alerts()
        firing = [
            a for a in alerts
            if a.get("status", {}).get("state") == "active"
            and a.get("labels", {}).get("alertname") not in EXCLUDED_ALERTS
            and a.get("labels", {}).get("severity", "") in ALLOWED_SEVERITIES
        ]

        if not firing:
            print("[INFO] 분석할 firing alert 없음.")
            return

        cache = get_cache()
        now = datetime.now(timezone.utc).timestamp()
        analyzed_count = 0

        print(f"[INFO] {len(firing)}개 firing alert 발견. 중복 체크 후 분석 시작...")

        seen_alert_keys = set()

        for i, alert in enumerate(firing):
            labels = alert.get("labels", {})
            alert_name = labels.get("alertname", "Unknown")
            summary = alert.get("annotations", {}).get("summary", "N/A")
            cache_key = get_alert_cache_key(alert)

            if is_recently_analyzed(cache, cache_key):
                print(f"[SKIP] {alert_name} — 30분 내 이미 분석됨")
                continue

            if cache_key in seen_alert_keys:
                print(f"[SKIP] {alert_name} — 같은 실행 내 이미 분석함")
                continue

            print(f"[ANALYZING] {alert_name}: {summary}")
            analysis = ask_holmes(alert_name, summary, labels)
            jira_issue = create_jira_issue(alert_name, labels, analysis)
            send_to_slack(alert_name, summary, analysis, labels, jira_issue)

            cache[cache_key] = now
            seen_alert_keys.add(cache_key)
            analyzed_count += 1

            if i < len(firing) - 1:
                time.sleep(15)

        cache = {k: v for k, v in cache.items() if (now - v) < 7200}
        save_cache(cache)
        print(f"[DONE] {analyzed_count}개 alert 분석 완료.")

    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: holmes-alert-analyzer
  namespace: monitoring
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: robusta-stack-holmes-service-account
          restartPolicy: Never
          containers:
            - name: analyzer
              image: python:3.11-slim
              command: ["python3", "/scripts/analyze.py"]
              env:
                - name: ALERTMANAGER_URL
                  value: "http://monitoring-stack-kube-prom-alertmanager:9093"
                - name: HOLMES_URL
                  value: "http://robusta-stack-holmes:80"
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: holmes-slack-webhook
                      key: url
                - name: SLACK_BOT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: robusta-slack-bot
                      key: slack-token
                      optional: true
                - name: SLACK_CHANNEL
                  value: "infra-ai-analysis"
                - name: JIRA_EMAIL
                  valueFrom:
                    secretKeyRef:
                      name: jira-credentials
                      key: email
                - name: JIRA_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: jira-credentials
                      key: api-token
                - name: JIRA_BASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: jira-credentials
                      key: base-url
                - name: JIRA_PROJECT_KEY
                  valueFrom:
                    secretKeyRef:
                      name: jira-credentials
                      key: project-key
                      optional: true
                - name: JIRA_PARENT_KEY
                  valueFrom:
                    secretKeyRef:
                      name: jira-credentials
                      key: parent-key
                      optional: true
                - name: JIRA_ISSUE_TYPE
                  valueFrom:
                    secretKeyRef:
                      name: jira-credentials
                      key: issue-type
                      optional: true
                - name: JIRA_ISSUE_TYPE_ID
                  valueFrom:
                    secretKeyRef:
                      name: jira-credentials
                      key: issue-type-id
                      optional: true
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: holmes-alert-analyzer
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
              effect: NoSchedule

