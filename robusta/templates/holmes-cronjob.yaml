apiVersion: v1
kind: ConfigMap
metadata:
  name: holmes-alert-analyzer
  namespace: monitoring
data:
  analyze.py: |
    #!/usr/bin/env python3
    """
    Firing alert를 Alertmanager에서 가져와 Holmes에 분석 요청 후 Slack으로 전송.
    30분 내 동일 alert 재분석 방지 (ConfigMap 기반 중복 체크).
    """
    import json
    import os
    import urllib.request
    import time
    import subprocess
    from datetime import datetime, timezone

    ALERTMANAGER_URL = os.environ.get("ALERTMANAGER_URL", "http://monitoring-stack-kube-prom-alertmanager:9093")
    HOLMES_URL = os.environ.get("HOLMES_URL", "http://robusta-stack-holmes:80")
    SLACK_WEBHOOK_URL = os.environ.get("SLACK_WEBHOOK_URL", "")
    CACHE_CM_NAME = "holmes-analyzed-cache"
    CACHE_CM_NAMESPACE = "monitoring"
    DEDUP_SECONDS = 1800  # 30분

    # 분석 제외할 alert (노이즈/시스템용)
    EXCLUDED_ALERTS = {"Watchdog", "InfoInhibitor"}

    # severity가 warning 또는 critical인 것만 분석
    ALLOWED_SEVERITIES = {"warning", "critical"}

    def get_cache():
        """ConfigMap에서 이전 분석 기록 조회"""
        try:
            result = subprocess.run(
                ["kubectl", "get", "configmap", CACHE_CM_NAME, "-n", CACHE_CM_NAMESPACE,
                 "-o", "jsonpath={.data.cache}"],
                capture_output=True, text=True, timeout=10
            )
            if result.returncode == 0 and result.stdout:
                return json.loads(result.stdout)
        except Exception:
            pass
        return {}

    def save_cache(cache):
        """분석 기록을 ConfigMap에 저장"""
        cache_json = json.dumps(cache)
        patch = json.dumps({"data": {"cache": cache_json}})
        try:
            # ConfigMap이 없으면 생성
            subprocess.run(
                ["kubectl", "create", "configmap", CACHE_CM_NAME, "-n", CACHE_CM_NAMESPACE,
                 f"--from-literal=cache={cache_json}", "--dry-run=client", "-o", "yaml"],
                capture_output=True, text=True, timeout=10
            )
            subprocess.run(
                ["kubectl", "apply", "-f", "-"],
                input=subprocess.run(
                    ["kubectl", "create", "configmap", CACHE_CM_NAME, "-n", CACHE_CM_NAMESPACE,
                     f"--from-literal=cache={cache_json}", "--dry-run=client", "-o", "yaml"],
                    capture_output=True, text=True, timeout=10
                ).stdout,
                capture_output=True, text=True, timeout=10
            )
        except Exception as e:
            print(f"[WARN] 캐시 저장 실패: {e}")

    def is_recently_analyzed(cache, fingerprint):
        """30분 내 분석한 alert인지 확인"""
        if fingerprint not in cache:
            return False
        last_time = cache[fingerprint]
        now = datetime.now(timezone.utc).timestamp()
        return (now - last_time) < DEDUP_SECONDS

    def get_firing_alerts():
        url = f"{ALERTMANAGER_URL}/api/v2/alerts?active=true"
        req = urllib.request.Request(url)
        try:
            with urllib.request.urlopen(req, timeout=10) as resp:
                return json.loads(resp.read().decode())
        except Exception as e:
            print(f"[ERROR] Alertmanager 조회 실패: {e}")
            return []

    def ask_holmes(alert_name, summary, labels):
        question = f"다음 Kubernetes alert를 한국어로 분석해줘. alert 이름: '{alert_name}', 요약: {summary}, 라벨: {json.dumps(labels)}. 근본 원인과 해결 방법을 한국어로 설명해줘. 응답에 <result> 태그를 붙이지 마."
        data = json.dumps({
            "ask": question,
            "resource": {
                "name": alert_name,
                "namespace": labels.get("namespace", "unknown"),
                "kind": "Alert"
            }
        }).encode()
        req = urllib.request.Request(
            f"{HOLMES_URL}/api/chat",
            data=data,
            headers={"Content-Type": "application/json"}
        )
        try:
            with urllib.request.urlopen(req, timeout=120) as resp:
                result = json.loads(resp.read().decode())
                analysis = result.get("analysis", "분석 결과를 가져오지 못했습니다.")
                analysis = analysis.replace("<result>", "").replace("</result>", "").strip()
                return analysis
        except Exception as e:
            return f"Holmes 분석 실패: {e}"

    def send_to_slack(alert_name, summary, analysis):
        if not SLACK_WEBHOOK_URL:
            print(f"[SKIP] SLACK_WEBHOOK_URL 미설정. 콘솔 출력:\n{analysis}")
            return
        payload = {
            "blocks": [
                {
                    "type": "header",
                    "text": {"type": "plain_text", "text": f"🔍 AI Alert 분석: {alert_name}"}
                },
                {
                    "type": "section",
                    "text": {"type": "mrkdwn", "text": f"*Summary:* {summary}"}
                },
                {
                    "type": "section",
                    "text": {"type": "mrkdwn", "text": f"*AI 분석 결과:*\n{analysis[:2900]}"}
                }
            ]
        }
        data = json.dumps(payload).encode()
        req = urllib.request.Request(
            SLACK_WEBHOOK_URL,
            data=data,
            headers={"Content-Type": "application/json"}
        )
        try:
            urllib.request.urlopen(req, timeout=10)
            print(f"[OK] Slack 전송 완료: {alert_name}")
        except Exception as e:
            print(f"[ERROR] Slack 전송 실패: {e}")

    def main():
        alerts = get_firing_alerts()
        firing = [
            a for a in alerts
            if a.get("status", {}).get("state") == "active"
            and a.get("labels", {}).get("alertname") not in EXCLUDED_ALERTS
            and a.get("labels", {}).get("severity", "") in ALLOWED_SEVERITIES
        ]

        if not firing:
            print("[INFO] 분석할 firing alert 없음.")
            return

        # 중복 분석 방지: 캐시 로드
        cache = get_cache()
        now = datetime.now(timezone.utc).timestamp()
        analyzed_count = 0

        print(f"[INFO] {len(firing)}개 firing alert 발견. 중복 체크 후 분석 시작...")

        for i, alert in enumerate(firing):
            labels = alert.get("labels", {})
            alert_name = labels.get("alertname", "Unknown")
            fingerprint = alert.get("fingerprint", alert_name)
            summary = alert.get("annotations", {}).get("summary", "N/A")

            if is_recently_analyzed(cache, fingerprint):
                print(f"[SKIP] {alert_name} (fingerprint={fingerprint}) — 30분 내 이미 분석됨")
                continue

            print(f"[ANALYZING] {alert_name}: {summary}")
            analysis = ask_holmes(alert_name, summary, labels)
            send_to_slack(alert_name, summary, analysis)

            # 캐시에 기록
            cache[fingerprint] = now
            analyzed_count += 1

            # Rate limit 방지: 요청 사이 15초 대기
            if i < len(firing) - 1:
                time.sleep(15)

        # 캐시 저장 (오래된 항목 정리: 2시간 이상 된 것 삭제)
        cache = {k: v for k, v in cache.items() if (now - v) < 7200}
        save_cache(cache)
        print(f"[DONE] {analyzed_count}개 alert 분석 완료.")

    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: holmes-alert-analyzer
  namespace: monitoring
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: robusta-stack-holmes-service-account
          restartPolicy: Never
          containers:
            - name: analyzer
              image: python:3.11-slim
              command: ["sh", "-c"]
              args:
                - |
                  apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
                  curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                  chmod +x kubectl && mv kubectl /usr/local/bin/
                  python3 /scripts/analyze.py
              env:
                - name: ALERTMANAGER_URL
                  value: "http://monitoring-stack-kube-prom-alertmanager:9093"
                - name: HOLMES_URL
                  value: "http://robusta-stack-holmes:80"
                - name: SLACK_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: holmes-slack-webhook
                      key: url
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: holmes-alert-analyzer
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
              effect: NoSchedule
