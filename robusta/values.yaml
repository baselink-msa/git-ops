robusta:
  # ─── 클러스터 정보 ───
  clusterName: "baselink-dev"
  isSmallCluster: true

  # ─── HolmesGPT (AI 자동 분석) 활성화 ───
  enableHolmesGPT: true
  holmes:
    enablePostProcessing: true
    additionalEnvVars:
      - name: MODEL
        value: "bedrock/anthropic.claude-3-haiku-20240307-v1:0"
      - name: AWS_REGION_NAME
        value: "ap-northeast-2"
      - name: LITELLM_DROP_PARAMS
        value: "true"
      - name: PYTHONPATH
        value: "/etc/holmes/config"
    toolsets: {}
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::740831361032:role/baselink-dev-robusta-bedrock"
    command:
      - "sh"
      - "-c"
      - |
        sed -i 's/if not _is_gemini_route(litellm_model_name):/if not _is_gemini_route(litellm_model_name) and not litellm_model_name.startswith("bedrock\/"):/' /app/holmes/core/llm.py
        exec python3 -u server.py
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "arn:aws:iam::740831361032:role/baselink-dev-robusta-bedrock"

  # ─── Robusta Runner 설정 ───
  runner:
    additional_env_vars:
      - name: SLACK_API_KEY
        valueFrom:
          secretKeyRef:
            name: robusta-slack-bot
            key: slack-token
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi

  # ─── ServiceAccount (IRSA for Bedrock) ───
  runnerServiceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::740831361032:role/baselink-dev-robusta-bedrock"

  # ─── Slack Sink (Secret 참조 방식) ───
  sinksConfig:
    - slack_sink:
        name: infra_ai_analysis_slack
        slack_channel: infra-ai-analysis
        api_key: "{{ env.SLACK_API_KEY }}"

  # ─── Prometheus 연동 ───
  enablePrometheusStack: false
  globalConfig:
    prometheus_url: "http://monitoring-stack-kube-prom-prometheus.monitoring:9090"
    alertmanager_url: "http://monitoring-stack-kube-prom-alertmanager.monitoring:9093"

  # ─── 자동 AI 분석 Playbook ───
  # source=ai-analysis 라벨이 붙은 alert 발생 시 HolmesGPT가 자동으로 분석 실행
  customPlaybooks:
    - triggers:
        - on_prometheus_alert:
            status: "firing"
            alert_name: ""
      actions:
        - ask_holmes: {}
      sinks:
        - infra_ai_analysis_slack

  # ─── 시스템 노드 배치 ───
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
      effect: NoSchedule
