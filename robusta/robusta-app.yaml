apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: robusta-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/baselink-msa/git-ops.git
    targetRevision: main
    path: robusta
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
