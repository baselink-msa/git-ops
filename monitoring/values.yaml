kube-prometheus-stack:
  defaultRules:
    create: true

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
    config:
      global:
        resolve_timeout: 5m
      route:
        receiver: "null"
        group_by: ["namespace"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        routes:
          - matchers:
              - alertname = "Watchdog"
            receiver: "null"
          - matchers:
              - source = "ai-analysis"
            receiver: "null"
      receivers:
        - name: "null"

  prometheus:
    prometheusSpec:
      enableRemoteWriteReceiver: true
      resources:
        requests:
          cpu: 300m
          memory: 1Gi
        limits:
          memory: 2Gi

  prometheusOperator:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

  grafana:
    replicas: 2
    podAnnotations:
      karpenter.sh/do-not-disrupt: "true"
      cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: grafana
                  app.kubernetes.io/instance: monitoring-stack
              topologyKey: kubernetes.io/hostname
    sidecar:
      dashboards:
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      datasources:
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
    grafana.ini:
      server:
        domain: baselink.kro.kr
        root_url: "https://baselink.kro.kr/grafana/"
        serve_from_sub_path: true
      security:
        allow_embedding: true
      users:
        viewers_can_edit: true
      auth.anonymous:
        enabled: true
        org_role: Viewer
    adminPassword: "Password123!"
    additionalDataSources:
      - name: Jaeger
        uid: jaeger
        type: jaeger
        url: http://jaeger.monitoring:16686
        access: proxy
        isDefault: false
