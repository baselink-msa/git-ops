apiVersion: v1
kind: ConfigMap
metadata:
  name: baselink-dashboard-loadtest
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  06-loadtest.json: |-
    {
      "title": "BaseLink - Load Test",
      "uid": "baselink-loadtest",
      "tags": ["baselink", "loadtest", "k6", "waf", "keda"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "5s",
      "time": { "from": "now-30m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {}
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "[WAF] Rule별 매치 건수 - 최근 10분",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "WAF 테스트 직후 어떤 Rule이 매치됐는지 확인하는 최근 10분 요청 수",
          "targets": [
            {
              "expr": "sum by (dimension_WebACL, dimension_Rule) (max_over_time(aws_wafv2_blocked_requests_sum{dimension_Rule!=\"ALL\",dimension_Rule!=\"\"}[10m]))",
              "legendFormat": "{{ "{{" }} dimension_WebACL {{ "}}" }} / {{ "{{" }} dimension_Rule {{ "}}" }} blocked",
              "refId": "A"
            },
            {
              "expr": "sum by (dimension_WebACL, dimension_Rule) (max_over_time(aws_wafv2_counted_requests_sum{dimension_Rule!=\"ALL\",dimension_Rule!=\"\"}[10m]))",
              "legendFormat": "{{ "{{" }} dimension_WebACL {{ "}}" }} / {{ "{{" }} dimension_Rule {{ "}}" }} counted",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "bars",
                "lineInterpolation": "stepAfter",
                "fillOpacity": 35,
                "showPoints": "never",
                "stacking": { "mode": "none", "group": "A" }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 2,
          "title": "[WAF] Blocked / Counted 요청 수 - 최근 10분",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "WebACL 기준 최근 10분 동안 차단 또는 Count 처리된 요청 수",
          "targets": [
            {
              "expr": "sum by (dimension_WebACL) (max_over_time(aws_wafv2_blocked_requests_sum{dimension_Rule=\"ALL\"}[10m]))",
              "legendFormat": "{{ "{{" }} dimension_WebACL {{ "}}" }} blocked",
              "refId": "A"
            },
            {
              "expr": "sum by (dimension_WebACL) (max_over_time(aws_wafv2_counted_requests_sum{dimension_Rule=\"ALL\"}[10m]))",
              "legendFormat": "{{ "{{" }} dimension_WebACL {{ "}}" }} counted",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "bars",
                "lineInterpolation": "stepAfter",
                "fillOpacity": 30,
                "showPoints": "never",
                "stacking": { "mode": "none", "group": "A" }
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 3,
          "title": "[KEDA/K8s] 서비스별 CPU 사용률",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "부하테스트 중 Pod가 늘어나도 서비스 단위로 묶어서 CPU request 대비 사용률을 확인. HPA/KEDA CPU 70% 기준 확인용",
          "targets": [
            {
              "expr": "sum by (service) (label_replace(rate(container_cpu_usage_seconds_total{namespace=\"baselink-dev\", container!=\"\", pod=~\"(game-service|ticket-service|seat-lock-service|auth-service|waiting-room-service|order-service)-.*\"}[1m]), \"service\", \"$1\", \"pod\", \"^(.+)-[a-z0-9]+-[a-z0-9]+$\")) / sum by (service) (label_replace(kube_pod_container_resource_requests{namespace=\"baselink-dev\", resource=\"cpu\", pod=~\"(game-service|ticket-service|seat-lock-service|auth-service|waiting-room-service|order-service)-.*\"}, \"service\", \"$1\", \"pod\", \"^(.+)-[a-z0-9]+-[a-z0-9]+$\")) * 100",
              "legendFormat": "{{ "{{" }} service {{ "}}" }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        },
        {
          "id": 4,
          "title": "[KEDA/K8s] 서비스별 Pod 수",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "부하테스트 중 KEDA/HPA로 서비스 Pod 수가 늘어나는지 마지막 값을 서비스별 세로 막대로 확인",
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"baselink-dev\", deployment=~\"game-service|ticket-service|seat-lock-service|auth-service|waiting-room-service|order-service\"}",
              "legendFormat": "{{ "{{" }} deployment {{ "}}" }}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "max": 10,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 4 },
                  { "color": "blue", "value": 8 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "orientation": "vertical",
            "displayMode": "basic",
            "showUnfilled": true,
            "reduceOptions": { "values": false, "calcs": ["lastNotNull"], "fields": "" }
          }
        },
        {
          "id": 5,
          "title": "[KEDA/K8s] Ready Node 수",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "부하테스트 중 Karpenter/Cluster Autoscaler로 노드 수가 늘어나는지 확인",
          "targets": [
            {
              "expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "Ready Nodes",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "values": false, "calcs": ["lastNotNull"], "fields": "" },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value"
          }
        },
        {
          "id": 6,
          "title": "[Seat Read] 좌석 조회 응답시간",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "description": "좌석 조회 부하테스트(seats-list.js)에서 game-service의 /api/games/{gameId}/seats 응답시간 증가 구간을 확인",
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_sum{application=\"game-service\", uri=~\".*/seats\"}[1m])) / sum(rate(http_server_requests_seconds_count{application=\"game-service\", uri=~\".*/seats\"}[1m])) * 1000",
              "legendFormat": "avg",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application=\"game-service\", uri=~\".*/seats\"}[1m])) by (le)) * 1000",
              "legendFormat": "p95",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{application=\"game-service\", uri=~\".*/seats\"}[1m])) by (le)) * 1000",
              "legendFormat": "p99",
              "refId": "C"
            },
            {
              "expr": "sum(rate(http_server_requests_seconds_count{application=\"game-service\", uri=~\".*/seats\"}[1m]))",
              "legendFormat": "requests/s",
              "refId": "D",
              "hide": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10,
                "showPoints": "never"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1000 },
                  { "color": "red", "value": 2000 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] },
            "tooltip": { "mode": "multi", "sort": "desc" }
          }
        }
      ]
    }
