---
# Jaeger All-in-One (경량 배포, dev 환경용)
# 앱 → Jaeger(OTLP 직접 수신 + trace 저장/조회)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
      annotations:
        karpenter.sh/do-not-disrupt: "true"
        cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
    spec:
      nodeSelector:
        workload: monitoring
      tolerations:
        - key: monitoring
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: jaeger
          image: jaegertracing/jaeger:2.4.0
          args:
            - "--set=extensions.jaeger_storage.backends.some_storage.memory.max_traces=50000"
          ports:
            - name: ui
              containerPort: 16686
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: "memory"
            - name: MEMORY_MAX_TRACES
              value: "50000"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
    - name: ui
      port: 16686
      targetPort: ui
      protocol: TCP
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
  selector:
    app: jaeger
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: jaeger
  namespace: monitoring
  labels:
    app: jaeger
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: jaeger
